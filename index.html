<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Consultant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <header class="main-display">
            <div id="weather-icon">🌤️</div>
            <h2 id="cityNameDisplay">Weather Consultant</h2>
            <div id="main-temp">
                <span id="temp-c">--</span>°C
                <span id="temp-f" class="temp-secondary"></span>
            </div>
            <p id="description">Ready for your forecast?</p>
            <p id="descriptor" class="descriptor"></p>
        </header>

        <section class="controls">
            <input type="text" id="nameInput" placeholder="Your name..." autocomplete="off">
            <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
            <button onclick="getRealWeather()">Check Weather</button>
        </section>

        <footer id="details" class="bento-grid">
            <div class="bento-item">
                <span class="label">💧 Humidity</span>
                <span class="value"><strong id="humidity">0</strong>%</span>
            </div>
            <div class="bento-item">
                <span class="label">🌬️ Wind</span>
                <span class="value"><strong id="wind">0</strong> <small>m/s</small></span>
            </div>
            <div class="bento-item wide">
                <span class="label">🌡️ Feels Like</span>
                <span class="value"><strong id="feelsLike">0</strong>°C</span>
            </div>
        </footer>
    </div>
    <script src="advice.js"></script>
</body>
</html>
