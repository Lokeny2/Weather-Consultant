<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Consultant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <header class="main-display">
            <div id="weather-icon">🌤️</div>
            <h2 id="cityNameDisplay">Weather Consultant</h2>

            <!-- Idle state -->
            <div id="idle-display">
                <p id="typewriter"></p>
            </div>

            <!-- Live temp -->
            <div id="main-temp">
                <span id="temp-c">--</span>°C
                <span id="temp-f" class="temp-secondary"></span>
            </div>

            <p id="description">Ready for your forecast?</p>
            <p id="descriptor" class="descriptor"></p>
        </header>

        <section class="controls">
            <input type="text" id="nameInput" placeholder="Your name..." autocomplete="off">
            <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
            <button onclick="getRealWeather()">Check Weather</button>
        </section>

        <footer id="details" class="bento-grid">
            <div class="bento-item">
                <span class="label">💧 Humidity</span>
                <span class="value"><strong id="humidity">0</strong>%</span>
            </div>
            <div class="bento-item">
                <span class="label">🌬️ Wind</span>
                <span class="value"><strong id="wind">0</strong> <small>m/s</small></span>
            </div>
            <div class="bento-item wide">
                <span class="label">🌡️ Feels Like</span>
                <span class="value"><strong id="feelsLike">0</strong>°C</span>
            </div>
        </footer>
    </div>

    <script src="advice.js"></script>

    <script>
const phrases = [
    "Climate is what we expect. Weather is what we get. — Mark Twain",
    "Sunshine is delicious, rain is refreshing. — John Ruskin",
    "There is no such thing as bad weather, only different kinds of good weather. — John Ruskin",
    "Wherever you go, no matter the weather, always bring your own sunshine. — Anthony J. D'Angelo",
    "The sky is the daily bread of the eyes. — Ralph Waldo Emerson",
    "After every storm the sun will smile. — William R. Alger",
    "Rain is grace; rain is the sky descending to the earth. — John Updike",
    "The best thing one can do when it is raining is to let it rain. — Henry Wadsworth Longfellow",
    "To appreciate the beauty of a snowflake, you need to stand in the cold. — Aristotle",
    "Clouds come floating into my life to add colour to my sunset sky. — Rabindranath Tagore",
    "Some people feel the rain. Others just get wet. — Bob Marley",
    "The sun does not abandon the moon to darkness. — Taoist proverb",
];

        let phraseIndex = 0;
        let charIndex   = 0;
        let isDeleting  = false;
        let typeTimer;

        function type() {
            const current = phrases[phraseIndex];

            if (isDeleting) {
                charIndex--;
            } else {
                charIndex++;
            }

            document.getElementById('typewriter').textContent = current.slice(0, charIndex);

            let speed = isDeleting ? 40 : 80;

            if (!isDeleting && charIndex === current.length) {
                speed      = 2000;  // pause at full phrase
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting  = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                speed       = 400;  // pause before next phrase
            }

            typeTimer = setTimeout(type, speed);
        }

        type(); 
    </script>
</body>
</html>
